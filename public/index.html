<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GuessMaster · Chat Edition</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <h1>🎲 GuessMaster</h1>
      <div class="header-right">
        <div class="timer-badge" id="timerDisplay">
          <span>⏱️</span>
          <span id="timerValue">0</span><span>s</span>
        </div>
        <div id="connectionStatus" class="connection-badge">
          <span class="dot"></span>
          <span id="statusText">Connecting</span>
        </div>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Sidebar: Players -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <h2>👥 Players <span id="playerCount">0</span></h2>
          <ul id="playerList" class="player-list">
            <li class="empty-msg">No players yet</li>
          </ul>
          <div id="gmInfo" class="gm-info">
            <span>👑 Game Master:</span>
            <span id="gmName">—</span>
          </div>
        </div>

        <!-- Join Form (if not joined) -->
        <div id="joinCard" class="sidebar-card">
          <h2>👋 Join</h2>
          <form id="joinForm">
            <input type="text" id="playerName" placeholder="Your name" maxlength="20" autocomplete="off" required>
            <button type="submit" class="btn btn-primary full-width">Join Game</button>
          </form>
          <p class="note">First to join becomes GM</p>
        </div>

        <!-- GM Panel (collapsible) -->
        <div id="gmPanel" class="sidebar-card hidden">
          <h2>🎮 GM Controls</h2>
          <div class="gm-section">
            <label for="questionInput">Question</label>
            <input type="text" id="questionInput" placeholder="e.g., Capital of France?">
            <label for="answerInput">Answer</label>
            <input type="text" id="answerInput" placeholder="paris">
            <button id="setQuestionBtn" class="btn btn-secondary full-width">Set Question</button>
          </div>
          <div class="gm-section">
            <button id="startGameBtn" class="btn btn-success full-width" disabled>▶ Start Round</button>
            <p id="startHint" class="note">Set a question first</p>
          </div>
        </div>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area">
        <!-- Current Question Banner -->
        <div class="question-banner">
          <div class="question-label">CURRENT QUESTION</div>
          <div id="currentQuestion" class="question-text">—</div>
          <div id="gameStateBadge" class="state-badge">⏳ WAITING</div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
          <div class="message system">🟢 Welcome! Enter your name to join.</div>
        </div>

        <!-- Guess Input (hidden when not active) -->
        <div id="guessArea" class="chat-input-area hidden">
          <form id="guessForm" class="guess-form">
            <input type="text" id="guessInput" placeholder="Type your guess..." autocomplete="off" disabled>
            <button type="submit" class="btn btn-primary" disabled>Send</button>
          </form>
          <div class="guess-info">
            <span>Attempts: <span id="attemptsUsed">0</span>/<span id="maxAttempts">3</span></span>
            <span id="guessMessage" class="note"></span>
          </div>
        </div>

        <!-- Winner Toast -->
        <div id="winnerToast" class="winner-toast hidden">
          🎉 You won this round! +10 points
        </div>
      </main>
    </div>
  </div>

  <template id="playerTemplate">
    <li class="player-item">
      <span class="player-name"></span>
      <span class="player-score"></span>
      <span class="crown" title="Game Master">👑</span>
    </li>
  </template>

  <script src="client.js"></script>
</body>
</html>
